# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    repos:
      copr:
        - lizardbyte/beta # sunshine
        - rockowitz/ddcutil
        - ublue-os/packages
        - jdxcode/mise
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
      # - https://copr.fedorainfracloud.org/coprs/zeno/scrcpy/repo/fedora-%OS_VERSION%/scrcpy-%OS_VERSION%.repo
      # - https://copr.fedorainfracloud.org/coprs/atim/nushell/repo/fedora-%OS_VERSION%/nushell-%OS_VERSION%.repo
      # - https://gist.githubusercontent.com/jonerrr/b05877f03079f7e433351a84adaf3fb5/raw/fe67bf7bfcb5b4c0c9b199e1e6f0a2534381c30d/oneAPI.repo # vtune
    install:
      packages:
        # terminal
        - fish
        # remote access
        - tailscale
        - Sunshine
        - https://github.com/joshuar/go-hass-agent/releases/download/v14.3.1/go-hass-agent-14.3.1-1.x86_64.rpm
        # development
        - distrobox
        - mise
        - podman-compose
        - nvidia-container-toolkit
        - neovim
        # storage / backup
        - restic
        - rclone
        - syncthing
        # utils
        - flatpak-xdg-utils
        - unrar
        - p7zip
        - lzip
        - uupd
        - ddcutil
        # - ddcui
        # gnome
        - gnome-shell-extension-gsconnect # Breaks if you install via extensions module
        - webextension-gsconnect
        - nautilus-gsconnect
        - gnome-shell-extension-appindicator
        - gnome-shell-extension-just-perfection
        # - gnome-shell-extension-blur-my-shell
        # - nautilus-open-any-terminal
        # Copyous dependencies
        - libgda
        - libgda-sqlite
        # Vitals dependencies
        - libgtop2-devel
        - lm_sensors
        # vms / debugging
        - waydroid
        - bridge-utils
        # TODO: get usbmuxd working in a distrobox
        - usbmuxd
        - libusbmuxd-utils
        - setroubleshoot
        - mosh
        # boot stuff
        # - systemd-boot-unsigned

        # osbuild stuff
        # - osbuild-composer
        # - composer-cli
        # - kernel-devel
        # - livecd-tools
        # - cosmic-desktop
    group-install:
      packages:
        - virtualization
    remove:
      packages:
        - firefox # using flatpak instead
        # need to remove these so systemd-boot is used
        # - bootupd # Must be removed to trigger bootc's systemd-boot logic
        # - grub2                  # TODO: cleanup grub packages
        # - grub2-common
        # - grub2-efi-x64
        # - grub2-tools
        # - shim-x64 # for secure boot systems

  # - type: brew
  # - type: akmods
  #   install:
  #     - v4l2loopback
  - type: gnome-extensions
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    install:
      - Vitals
      # - Airpod Battery Monitor
      - Compiz windows effect
      - Desktop Cube
      - Fullscreen Avoider
      # - 4470 # Media Controls TODO: find new version of this now that this ones archived
      - Weather O'Clock
      # - AppIndicator and KStatusNotifierItem Support
      - Just Perfection
      - 517 # Caffeine
      - Brightness control using ddcutil
      - Grand Theft Focus
      - 8834 # Copyous
    # uninstall:
    #   - GSConnect

  - type: files
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    files:
      - source: etc
        destination: /etc
      - source: usr
        destination: /usr

  - type: gschema-overrides
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    include:
      - zz1-defaults.gschema.override

  - type: chezmoi
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    repository: https://github.com/jonerrr/dotfiles

  - type: systemd
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    user:
      enabled:
        - syncthing.service
        - monitor-setup.service
        - hide-waydroid-apps.path
        - app-dev.lizardbyte.app.Sunshine.service
    system:
      enabled:
        - dconf-update.service
        - uupd.timer
        - libvirt-workaround.service
        - libvirt-backup.timer
        - libvirt-net-resume.service
        - tailscaled.service
        - flatpak-preinstall.service
        - configure-flatpaks.service
        - firefox-prefs.service
        - regen-nvctk-cdi.service
        - monitor-setup-resume.service
        - wowlan-enable@phy0.service
        - ssh-monitor.service

  - type: fonts
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    fonts:
      nerd-fonts:
        - FiraCode # don't add "Nerd Font" suffix.
        - NerdFontsSymbolsOnly
      google-fonts:
        - Roboto
        - Open Sans
        - Fira Sans

  - type: kargs
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
    kargs:
      # dgpu passthrough
      - intel_iommu=on
      - iommu=pt
      - rd.driver.pre=vfio_pci
      - vfio-pci.ids=10de:1c03,10de:10f1
      # virtual 4k monitor
      - drm.edid_firmware=DP-2:edid/fire_tv.bin
      - video=DP-2:e

  - type: initramfs
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29

  - type: signing
    source: ghcr.io/blue-build/modules@sha256:a21771c64475511f5d7f8ab98bfb74217658c9958c2b1cb956d9c0bcbbdeed29
